<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying... | @ARPANMODX</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      padding: 20px;
    }
    .card {
      background: #111;
      border: 1px solid #FFD700;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 0 40px rgba(255,215,0,0.1);
    }
    .brand { font-size: 22px; font-weight: 800; color: #FFD700; letter-spacing: 3px; }
    .sub   { font-size: 11px; color: #666; letter-spacing: 2px; margin-bottom: 24px; }
    .icon  { font-size: 44px; margin-bottom: 10px; }
    .title { font-size: 16px; color: #ddd; margin-bottom: 6px; }
    .desc  { font-size: 13px; color: #666; margin-bottom: 20px; }

    .countdown-wrap { margin-bottom: 20px; }
    .countdown-ring {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 10px;
    }
    .countdown-ring svg {
      transform: rotate(-90deg);
    }
    .countdown-ring circle {
      fill: none;
      stroke: #222;
      stroke-width: 5;
    }
    .countdown-ring .progress {
      stroke: #FFD700;
      stroke-dasharray: 220;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: 800;
      color: #FFD700;
    }
    .countdown-label { font-size: 12px; color: #666; }

    .captcha-wrap {
      display: none;
      justify-content: center;
      margin-bottom: 20px;
      min-height: 65px;
      align-items: center;
    }
    .captcha-wrap.show { display: flex; }

    .spinner {
      display: none;
      width: 28px; height: 28px;
      border: 3px solid #222;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status { font-size: 14px; color: #666; min-height: 20px; }
    #status.success { color: #4CAF50; font-weight: 600; }
    #status.error   { color: #f44336; }

    #errorBox {
      display: none;
      margin-top: 16px;
      background: #1a0a0a;
      border: 1px solid #f44;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      color: #f66;
    }
    .note { margin-top: 20px; font-size: 11px; color: #444; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">@ARPANMODX</div>
  <div class="sub">LINK IS PROTECTED</div>

  <div class="icon">🔒</div>
  <div class="title">This link is protected</div>
  <div class="desc">Please wait for verification</div>

  <!-- Countdown Ring -->
  <div class="countdown-wrap" id="countdownWrap">
    <div class="countdown-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="35"/>
        <circle class="progress" id="progressRing" cx="40" cy="40" r="35"/>
      </svg>
      <div class="countdown-num" id="countdownNum">5</div>
    </div>
    <div class="countdown-label">Please wait...</div>
  </div>

  <!-- CAPTCHA -->
  <div class="captcha-wrap" id="captchaWrap">
    <div class="cf-turnstile"
      data-sitekey="0x4AAAAAADr-pIx3m-2LpVlT"
      data-callback="onVerify"
      data-theme="dark">
    </div>
  </div>

  <div class="spinner" id="spinner"></div>
  <div id="status">⏳ Please wait 5 seconds...</div>
  <div id="errorBox"></div>

  <div class="note">🛡️ Protected by Cloudflare Turnstile<br/>Bots cannot access this link</div>
</div>

<script>
  let pageToken = null;
  const linkToken = new URLSearchParams(window.location.search).get('t');

  if (!linkToken) {
    document.getElementById('status').textContent = '❌ Invalid link!';
    document.getElementById('status').className = 'error';
    document.getElementById('countdownWrap').style.display = 'none';
  } else {
    // Get server-signed page token immediately on page load
    fetch('/api/init', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
      .then(r => r.json())
      .then(data => { pageToken = data.page_token; })
      .catch(() => { pageToken = null; });

    // Start 5 second countdown
    let seconds = 5;
    const total = 220; // circle circumference
    const progressEl = document.getElementById('progressRing');
    const countdownEl = document.getElementById('countdownNum');
    const statusEl    = document.getElementById('status');

    // Initialize ring
    progressEl.style.strokeDashoffset = 0;

    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      statusEl.textContent = `⏳ Please wait ${seconds} seconds...`;

      // Update ring progress
      progressEl.style.strokeDashoffset = total - (total * seconds / 5);

      if (seconds <= 0) {
        clearInterval(timer);
        document.getElementById('countdownWrap').style.display = 'none';
        document.getElementById('captchaWrap').classList.add('show');
        statusEl.textContent = '👆 Complete the verification above';
      }
    }, 1000);
  }

  async function onVerify(captchaToken) {
    if (!linkToken) return;

    if (!pageToken) {
      document.getElementById('status').textContent = '❌ Session error. Please refresh.';
      document.getElementById('status').className = 'error';
      return;
    }

    document.getElementById('spinner').style.display = 'block';
    document.getElementById('status').textContent = '⏳ Verifying...';
    document.getElementById('status').className = '';
    document.getElementById('errorBox').style.display = 'none';

    try {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          captcha_token: captchaToken,
          link_token:    linkToken,
          page_token:    pageToken   // server-signed, bot cannot fake!
        })
      });

      const data = await res.json();

      if (data.url) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = '✅ Verified! Redirecting...';
        document.getElementById('status').className = 'success';
        setTimeout(() => { window.location.href = data.url; }, 800);
      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = '❌ ' + (data.error || 'Verification failed!');
        document.getElementById('status').className = 'error';
        document.getElementById('errorBox').textContent = 'Please refresh and try again.';
        document.getElementById('errorBox').style.display = 'block';
      }
    } catch (e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = '❌ Error. Please refresh.';
      document.getElementById('status').className = 'error';
    }
  }
</script>
</body>
</html>
