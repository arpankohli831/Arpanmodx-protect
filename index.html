<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying... | ARPANMODX</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    .card {
      background: #111;
      border: 1px solid #FFD700;
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 0 30px rgba(255,215,0,0.15);
    }
    .brand {
      font-size: 22px;
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
    }
    .title {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 20px;
    }
    .captcha-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    #status {
      font-size: 14px;
      color: #888;
      min-height: 20px;
    }
    #status.success { color: #4CAF50; }
    #status.error { color: #f44336; }
    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">@ARPANMODX</div>
    <div class="sub">PROTEC BY ARPANMODX</div>
    <div class="title">✅ Prove you are human to get the link</div>

    <div class="captcha-wrap">
      <div class="cf-turnstile"
        data-sitekey="YOUR_SITE_KEY_HERE"
        data-callback="onVerify"
        data-theme="dark">
      </div>
    </div>

    <div class="spinner" id="spinner"></div>
    <div id="status">Complete the verification above 👆</div>
  </div>

  <script>
    async function onVerify(token) {
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('status').textContent = 'Verifying...';
      document.getElementById('status').className = '';

      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (data.url) {
          document.getElementById('status').textContent = '✅ Verified! Redirecting...';
          document.getElementById('status').className = 'success';
          setTimeout(() => { window.location.href = data.url; }, 800);
        } else {
          document.getElementById('status').textContent = '❌ Verification failed. Refresh and try again.';
          document.getElementById('status').className = 'error';
          document.getElementById('spinner').style.display = 'none';
        }
      } catch (e) {
        document.getElementById('status').textContent = '❌ Error. Please refresh.';
        document.getElementById('status').className = 'error';
        document.getElementById('spinner').style.display = 'none';
      }
    }
  </script>
</body>
</html>
